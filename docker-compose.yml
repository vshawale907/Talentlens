version: '3.9'

services:
  # ─── MongoDB ───────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: ai_resume_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: ai_resume
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network

  # ─── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: ai_resume_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - app_network

  # ─── Python AI Microservice ────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai_resume_nlp
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./ai-service/.env
    ports:
      - '8000:8000'
    networks:
      - app_network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Node.js Backend ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_resume_api
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
      - ai-service
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - AI_SERVICE_URL=http://ai-service:8000
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/ai_resume?authSource=admin
      - REDIS_URL=redis://redis:6379
    ports:
      - '5000:5000'
    networks:
      - app_network

  # ─── React Frontend (Nginx) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_resume_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_network

volumes:
  mongo_data:
  redis_data:

networks:
  app_network:
    driver: bridge
